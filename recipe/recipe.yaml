context:
  version: 1.0.2

package:
  name: python-pptx
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/python-pptx/python_pptx-${{ version }}.tar.gz
  sha256: 479a8af0eaf0f0d76b6f00b0887732874ad2e3188230315290cd1f9dd9cc7095

build:
  number: 1
  noarch: python
  script: python -m pip install . -vv --no-build-isolation --no-deps

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - lxml >=3.1.0
    - pillow >=3.3.2
    - xlsxwriter >=0.5.7
    - libiconv
    - typing-extensions

tests:
  - python:
      imports:
      - pptx
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license_file: LICENSE
  license: MIT
  summary: Generate and manipulate Open XML PowerPoint (.pptx) files
  homepage: http://github.com/scanny/python-pptx
  repository: http://github.com/scanny/python-pptx
  documentation: https://python-pptx.readthedocs.io

extra:
  recipe-maintainers:
    - pmlandwehr
    - synapticarbors
